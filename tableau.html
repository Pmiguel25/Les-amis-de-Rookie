!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau double entrée - Formes et couleurs</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: black;
    color: white;
}

/* Zone gauche */
#leftZone {
    width: 33%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    position: relative;
}

/* Zone droite (tableau) */
#gridZone {
    width: 67%;
    display: grid;
    grid-template-columns: 100px repeat(3, 1fr);
    grid-template-rows: 100px repeat(3, 1fr);
    border-left: 3px solid white;
}

/* Cases */
.cell {
    border: 2px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* En-têtes */
.header {
    font-weight: bold;
    font-size: 16px;
}

/* Couleurs */
.blue { background: blue; }
.yellow { background: yellow; color: black; }
.red { background: red; }

/* Formes (contenu draggable) */
.shape {
    width: 60px;
    height: 60px;
    position: absolute;
    touch-action: none;
}

/* Carré */
.square {
    background: currentColor;
}

/* Rond */
.circle {
    background: currentColor;
    border-radius: 50%;
}

/* Triangle */
.triangle {
    width: 0;
    height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 60px solid currentColor;
    background: none;
}

/* === Formes en contour blanc (en-têtes) === */
.shape-outline {
    width: 50px;
    height: 50px;
}

/* Carré contour */
.square-outline {
    border: 3px solid white;
}

/* Rond contour */
.circle-outline {
    border: 3px solid white;
    border-radius: 50%;
}

/* Triangle contour */
.triangle-outline {
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-bottom: 50px solid white;
    background: none;
}

/* Message fin */
#endMessage {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    color: white;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="leftZone"></div>
<div id="gridZone"></div>

<div id="endMessage">
    <h1>Bravo ! 🎉</h1>
    <button onclick="restart()">Rejouer</button>
</div>

<script>
const shapes = ["square", "triangle", "circle"];
const colors = [
    {name: "bleu", class: "blue"},
    {name: "jaune", class: "yellow"},
    {name: "rouge", class: "red"}
];

const gridZone = document.getElementById("gridZone");
const leftZone = document.getElementById("leftZone");

let pieces = [];
let currentPiece = null;
let placedCount = 0;

/* Création du tableau */
function createGrid() {
    gridZone.innerHTML = "";

    // coin vide
    gridZone.appendChild(document.createElement("div"));

    // ligne couleurs
    colors.forEach(c => {
        const cell = document.createElement("div");
        cell.className = "cell header " + c.class;
        cell.textContent = c.name;
        gridZone.appendChild(cell);
    });

    // lignes formes
    shapes.forEach(shape => {

        const header = document.createElement("div");
        header.className = "cell";

        const shapeEl = document.createElement("div");
        shapeEl.classList.add("shape-outline");

        if (shape === "square") shapeEl.classList.add("square-outline");
        if (shape === "circle") shapeEl.classList.add("circle-outline");
        if (shape === "triangle") shapeEl.classList.add("triangle-outline");

        header.appendChild(shapeEl);
        gridZone.appendChild(header);

        colors.forEach(c => {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.shape = shape;
            cell.dataset.color = c.class;
            gridZone.appendChild(cell);
        });
    });
}

/* Générer les pièces */
function generatePieces() {
    pieces = [];
    shapes.forEach(s => {
        colors.forEach(c => {
            pieces.push({shape: s, color: c.class});
        });
    });
    pieces.sort(() => Math.random() - 0.5);
}

/* Créer une forme */
function createShape(piece) {
    const el = document.createElement("div");
    el.classList.add("shape", piece.shape);
    el.style.color = piece.color;

    leftZone.appendChild(el);

    let offsetX, offsetY;

    el.addEventListener("pointerdown", e => {
        currentPiece = piece;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
        el.setPointerCapture(e.pointerId);
    });

    el.addEventListener("pointermove", e => {
        if (!currentPiece) return;
        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
    });

    el.addEventListener("pointerup", e => {
        el.releasePointerCapture(e.pointerId);

        const target = document.elementFromPoint(e.clientX, e.clientY);
        const cell = target.closest(".cell");

        if (cell &&
            cell.dataset.shape === piece.shape &&
            cell.dataset.color === piece.color &&
            cell.children.length === 0) {

            cell.appendChild(el);
            el.style.position = "static";

            placedCount++;
            currentPiece = null;

            if (placedCount === 9) {
                document.getElementById("endMessage").style.display = "flex";
            } else {
                spawnNext();
            }

        } else {
            resetPiece(el);
        }
    });
}

/* Reset */
function resetPiece(el) {
    el.style.left = "50%";
    el.style.top = "50%";
    el.style.transform = "translate(-50%, -50%)";
    currentPiece = null;
}

/* Nouvelle pièce */
function spawnNext() {
    leftZone.innerHTML = "";
    const piece = pieces.pop();
    createShape(piece);

    const el = leftZone.querySelector(".shape");
    el.style.position = "absolute";
    el.style.left = "50%";
    el.style.top = "50%";
    el.style.transform = "translate(-50%, -50%)";
}

/* Restart */
function restart() {
    placedCount = 0;
    document.getElementById("endMessage").style.display = "none";
    createGrid();
    generatePieces();
    spawnNext();
}

/* Init */
createGrid();
generatePieces();
spawnNext();

</script>

</body>
</html>
